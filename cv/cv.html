<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CV · Таймлайн · Yuri Konoplev</title>
  <link rel="stylesheet" href="../person/css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <link rel="stylesheet" href="css/cv.css">

</head>
<body>
  <header class="site-header">
    <a href="https://github.com/j0k/">j0k</a>
    <span class="header-sep">·</span>
    <a href="../index.html">На главную</a>
  </header>

  <main class="page cv-page">
    <div class="cv-header">
      <h1 class="cv-title">Таймлайн · работы и проекты</h1>
      <a href="cv_minimal_v1_ru.md">CV (текст)</a>
    </div>

    <section class="map-section" aria-label="Карта">
      <h2>Карта · клик по событию переносит сюда</h2>
      <div id="cvMap"></div>
    </section>

    <section class="timeline-section" aria-label="Таймлайн активностей">
      <h2>Клик по отрезку — что происходило</h2>
      <div class="timeline-zoom">
        <button type="button" class="timeline-zoom-btn" id="timelinePanLeft" title="Влево" aria-label="Влево">←</button>
        <button type="button" class="timeline-zoom-btn" id="timelinePanRight" title="Вправо" aria-label="Вправо">→</button>
        <button type="button" class="timeline-zoom-btn" id="timelineZoomOut" title="Отдалить" aria-label="Отдалить">−</button>
        <span id="timelineRangeLabel">2010 — 2025</span>
        <button type="button" class="timeline-zoom-btn" id="timelineZoomIn" title="Приблизить" aria-label="Приблизить">+</button>
        <span class="timeline-zoom-autohide">
          <label><input type="checkbox" id="timelineAutohide" checked> autohide</label>
          <label><input type="number" id="timelineAutohideDelay" min="0.5" max="30" step="0.5" value="2" aria-label="Задержка autohide, сек"> с</label>
        </span>
        <button type="button" class="timeline-zoom-btn timeline-zoom-btn-simulate" id="timelineSimulateBtn" title="Симуляция: клик по таймлайну — старт с выбранного года" aria-label="Simulate">Simulate</button>
      </div>
      <div class="timeline-simulate-console" id="timelineSimulateConsole" aria-live="polite">
        <div class="timeline-simulate-console-inner" id="timelineSimulateConsoleInner"></div>
      </div>
      <div class="timeline-legend" aria-label="Легенда">
        <span class="timeline-legend-item"><span class="timeline-legend-swatch" style="background:#2c5282"></span>Компания</span>
        <span class="timeline-legend-item"><span class="timeline-legend-swatch" style="background:var(--yc-orange)"></span>Стартап</span>
        <span class="timeline-legend-item"><span class="timeline-legend-swatch" style="background:#276749"></span>Исследования</span>
        <span class="timeline-legend-item"><span class="timeline-legend-swatch" style="background:#0d9488"></span>Обучение</span>
        <span class="timeline-legend-item"><span class="timeline-legend-swatch" style="background:#c2410c"></span>Общепит</span>
        <span class="timeline-legend-item"><span class="timeline-legend-swatch" style="background:#1d4ed8"></span>Спорт</span>
        <span class="timeline-legend-item"><span class="timeline-legend-swatch" style="background:#64748b"></span>Другое</span>
        <span class="timeline-legend-item"><span class="timeline-legend-swatch" style="background:#553c9a"></span>Сейчас</span>
      </div>
      <div class="timeline-scrollbar" id="timelineScrollbarTop" title="Ползунок — перемещение по годам">
        <div class="timeline-scrollbar-track" id="timelineScrollbarTrackTop"></div>
        <div class="timeline-scrollbar-thumb" id="timelineScrollbarThumbTop"></div>
      </div>
      <div class="timeline-axis" id="timelineAxis"></div>
      <div class="timeline-rows" id="timelineRows" title="Тянуть влево‑вправо — сдвиг; колёсико — приблизить/отдалить"></div>
      <div class="timeline-scrollbar" id="timelineScrollbar" title="Ползунок — перемещение по годам">
        <div class="timeline-scrollbar-track" id="timelineScrollbarTrack"></div>
        <div class="timeline-scrollbar-thumb" id="timelineScrollbarThumb"></div>
      </div>
    </section>

    <section class="detail-panel empty" id="detailPanel" aria-live="polite">
      Выберите отрезок на таймлайне — здесь появится описание.
    </section>
  </main>

  <script src="js/cv.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="js/cv-map.js"></script>
</body>
</html>
